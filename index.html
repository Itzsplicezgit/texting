<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat+</title>
<style>
body, html { margin:0; padding:0; height:100%; width:100%; font-family:Arial,sans-serif; background:#121212; color:#e0e0e0; }
#login, #chatPage { display:none; height:100%; width:100%; justify-content:center; align-items:center; flex-direction:column; }
#chatPage { display:flex; flex-direction:column; }
#chatBox { flex:1; overflow-y:auto; padding:10px; border-bottom:1px solid #333; background:#1e1e1e; }
.message { display:flex; align-items:flex-start; margin-bottom:10px; }
.message img { width:40px; height:40px; border-radius:50%; margin-right:10px; object-fit:cover; }
.message-content { max-width:80%; word-wrap:break-word; }
.message-content img { max-width:100%; border-radius:8px; margin-top:5px; }
.timestamp { font-size:10px; color:#888; margin-top:2px; }
#inputArea { display:flex; padding:10px; background:#121212; }
#inputArea input[type=text] { flex:1; padding:10px; border-radius:5px; border:none; margin-right:5px; }
#inputArea button { padding:10px 15px; border:none; border-radius:5px; background:#6200ea; color:white; cursor:pointer; }
#inputArea button:hover{ background:#3700b3; }
#usernamePfp { display:flex; align-items:center; margin-bottom:10px; }
#usernamePfp img { width:50px; height:50px; border-radius:50%; margin-left:10px; object-fit:cover; cursor:pointer; }
</style>
</head>
<body>

<div id="login">
  <h2>Welcome to Chat+</h2>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="login()">Enter Chat+</button>
</div>

<div id="chatPage">
  <div id="usernamePfp">
    <input type="text" id="username" placeholder="Username">
    <img id="pfpPreview" src="" alt="PFP" title="Click to change">
    <input type="file" id="pfpInput" style="display:none">
  </div>
  <div id="chatBox"></div>
  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const loginDiv = document.getElementById('login');
const chatDiv = document.getElementById('chatPage');
const chatBox = document.getElementById('chatBox');
const usernameInput = document.getElementById('username');
const pfpPreview = document.getElementById('pfpPreview');
const pfpInput = document.getElementById('pfpInput');

loginDiv.style.display="flex";

// Load pfp and username from localStorage
if(localStorage.getItem('chatplusUsername')) usernameInput.value = localStorage.getItem('chatplusUsername');
if(localStorage.getItem('chatplusPfp')) pfpPreview.src = localStorage.getItem('chatplusPfp');

// PFP change
pfpPreview.onclick = ()=> pfpInput.click();
pfpInput.onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const form = new FormData();
  form.append('pfp', file);
  const res = await fetch('/upload-pfp', { method:'POST', body:form });
  const data = await res.json();
  if(data.url){
    pfpPreview.src = data.url;
    localStorage.setItem('chatplusPfp', data.url);
  }
}

// Login
async function login(){
  const password = document.getElementById('passwordInput').value;
  const res = await fetch('/login',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password}) });
  const data = await res.json();
  if(data.success){
    loginDiv.style.display="none";
    chatDiv.style.display="flex";
    fetchMessages();
    setInterval(fetchMessages,2000);
  } else { alert("Incorrect password!"); }
}

// Send message
async function sendMessage(){
  const text = document.getElementById('messageInput').value.trim();
  if(!text) return;
  const user = usernameInput.value || "Guest";
  const pfp = pfpPreview.src || null;
  await fetch('/message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user,text,pfp}) });
  localStorage.setItem('chatplusUsername', user);
  document.getElementById('messageInput').value='';
  fetchMessages();
}

// Enter key to send
document.getElementById('messageInput').addEventListener('keypress', e=>{
  if(e.key==='Enter') sendMessage();
});

// Fetch messages
async function fetchMessages(){
  const res = await fetch('/messages');
  const messages = await res.json();
  chatBox.innerHTML="";
  messages.forEach(msg=>{
    const div = document.createElement('div');
    div.className='message';
    const img = document.createElement('img');
    img.src = msg.pfp || 'https://via.placeholder.com/40';
    const content = document.createElement('div');
    content.className='message-content';
    if(msg.text) content.textContent=msg.text;
    if(msg.image){
      const imgel = document.createElement('img');
      imgel.src=msg.image;
      content.appendChild(imgel);
    }
    const ts = document.createElement('div');
    ts.className='timestamp';
    ts.textContent = new Date(msg.timestamp).toLocaleString();
    content.appendChild(ts);
    div.appendChild(img);
    div.appendChild(content);
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
